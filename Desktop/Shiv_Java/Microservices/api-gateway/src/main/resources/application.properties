server.port=8080
spring.application.name=api-gateway

#Run the docker through command
#docker run -d -p 9411:9411 --name zipkin openzipkin/zipkin
# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Routes (optional if locator is enabled, but keep for safety)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://UserService
#spring.cloud.gateway.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/User/**

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://OrderService
#spring.cloud.gateway.routes[1].uri=lb://ORDERSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/Order/**
#Logging Used
spring.cloud.gateway.observability.enabled=true

#====Tracing Config ====
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{traceId:-}] [%X{spanId:-}] %-5level %logger - %msg%n
logging.file.name=C:/Users/Shiv/Desktop/Shiv_Java/Microservices/api-gateway/gateway.log