spring.application.name=OrderService

spring.datasource.url=jdbc:postgresql://localhost:5432/Data
spring.datasource.username=postgres
spring.datasource.password=0000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8082

# ================= Circuit Breaker =================
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.minimumNumberOfCalls=4
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.userService.slowCallRateThreshold=60
resilience4j.circuitbreaker.instances.userService.slowCallDurationThreshold=10s

# ================= Retry =================
resilience4j.retry.instances.userService.maxAttempts=3
resilience4j.retry.instances.userService.waitDuration=15s

# ================= Eureka =================
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ================= TRACING (FIXED) =================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c

# Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Actuator
management.endpoints.web.exposure.include=*

# ================= LOGGING =================
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [trace=%X{traceId:-}] [span=%X{spanId:-}] [%thread] %-5level %logger - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{traceId:-}] [%X{spanId:-}] %-5level %logger - %msg%n
logging.level.io.micrometer.tracing=DEBUG
logging.level.zipkin2=DEBUG
logging.level.brave=DEBUG
logging.file.name=C:/Users/Shiv/Desktop/Shiv_Java/Microservices/OrderService/orderservice.log
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.feign=DEBUG
spring.cloud.openfeign.micrometer.enabled=true